name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy ${{ github.event.inputs.environment || 'staging' }} environment
    steps:
      - uses: actions/checkout@v6
      - name: Install Node.js 25
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
      - name: Deploy using wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4.87.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          preCommands: npm run build
          command: deploy --env ${{ github.event.inputs.environment || 'staging' }}
